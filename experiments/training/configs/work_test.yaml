defaults:
  - training: reproducibility
  - predictive_model: transformer_small
  - generative_process: 2mess3_nonergodic
  - metric_tracker@training_metric_tracker: full
  - metric_tracker@eval_metric_tracker: loss_only
  - activation_tracker: simple_tracker
  - logging: print_logger
  - persistence: local_pytorch
  - optimizer: pytorch_adam
  - lr_scheduler: windowed_plateau
  - _self_

experiment_name: simplex_work_test
run_name: transformer_small
seed: 77
weight_init_seed: 7
device: auto

tags:
  research_step: training
  retention: ephemeral
  strict: "true"

experiment_tags:
  project: simplex_work_test

visualization:
  every: 10000
  cev:
    enabled: true
    colorscale: Archival
    max_components: null
    show_rangeslider: true
  belief_regression:
    enabled: true
    max_samples: 10000

hydra:
  run:
    dir: /nas/ucb/daniel_d_kang/simplex-work-test/runs/${experiment_name}/${run_name}/${now:%Y-%m-%d_%H-%M-%S}